<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-md">
    <h2 class="text-3xl font-bold text-center text-gray-900">Sign Up new</h2>
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label for="name" class="block text-sm font-medium text-gray-700">Name:</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          class="block w-full px-4 py-2 mt-1 text-gray-900 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
          [ngClass]="{'border-red-500': signupForm.get('name')?.invalid && signupForm.get('name')?.touched}"
        >
        <div
          *ngIf="signupForm.get('name')?.invalid && signupForm.get('name')?.touched"
          class="mt-2 text-sm text-red-600"
        >
          <span>Name is required.</span>
        </div>
      </div>
      <div class="space-y-2">
        <label for="email" class="block text-sm font-medium text-gray-700">Email:</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="block w-full px-4 py-2 mt-1 text-gray-900 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
          [ngClass]="{'border-red-500': signupForm.get('email')?.invalid && signupForm.get('email')?.touched}"
        >
        <div
          *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
          class="mt-2 text-sm text-red-600"
        >
          <span *ngIf="signupForm.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="signupForm.get('email')?.errors?.['email']">Invalid email format.</span>
        </div>
      </div>
      <div class="space-y-2">
        <label for="password" class="block text-sm font-medium text-gray-700">Password:</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="block w-full px-4 py-2 mt-1 text-gray-900 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
          [ngClass]="{'border-red-500': signupForm.get('password')?.invalid && signupForm.get('password')?.touched}"
        >
        <div
          *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched"
          class="mt-2 text-sm text-red-600"
        >
          <span *ngIf="signupForm.get('password')?.errors?.['required']">Password is required.</span>
          <span *ngIf="signupForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>
      <div>
        <button
          type="submit"
          [disabled]="signupForm.invalid"
          class="w-full px-4 py-2 font-bold text-white bg-indigo-600 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Sign Up
        </button>
      </div>
    </form>
    <div *ngIf="isLoading$ | async" class="text-center text-indigo-600">
      <p>Loading...</p>
    </div>
    <div *ngIf="error$ | async as error" class="text-center text-red-600">
      <p>Error: {{ error?.message }}</p>
    </div>
  </div>
</div>
