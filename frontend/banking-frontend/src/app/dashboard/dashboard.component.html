<div class="flex items-center justify-center min-h-screen bg-gray-100 p-4">
  <div class="w-full max-w-lg p-8 space-y-6 bg-white rounded-xl shadow-lg text-center">
    <h2 class="text-4xl font-extrabold text-gray-900 leading-tight">Welcome to the Dashboard!</h2>

    <div *ngIf="user$ | async as user" class="space-y-4">
      <h3 class="text-2xl font-semibold text-indigo-600">Hello, {{ user.name }}</h3>
      <p class="text-lg text-gray-700">Your email is: <span class="font-medium text-gray-900">{{ user.email }}</span></p>
    </div>

    <div *ngIf="!(user$ | async)" class="text-center text-red-500">
      <p>User data is not available.</p>
    </div>
  </div>
</div>
